services:
  gmaps-historie:
    build: .
    container_name: gmaps-historie
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - TZ=Europe/Prague
      - DB_PATH=/data/history.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/range', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
