name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y fonts-dejavu-core
          pip install -r requirements.txt pytest httpx ruff

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Syntax-check frontend (ES modules)
        run: |
          for f in app/static/common.js app/static/app.js app/static/kniha.js \
                  app/static/map-filters.js app/static/sync-events.js app/static/day-playback.js \
                  app/static/charts.js app/static/icons.js app/static/map-tools.js \
                  app/static/import-ui.js app/static/year-card.js; do
            node --input-type=module --check < "$f" && echo "$f ok"
          done

      - name: Run tests
        run: pytest -q
        env:
          TZ: Europe/Prague

      - name: Smoke test
        run: python scripts/smoke_test.py
        env:
          TZ: Europe/Prague

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y fonts-dejavu-core
          pip install -r requirements.txt pytest
          npm ci
          npx playwright install --with-deps chromium

      - name: Verify demo seed (webServer startup)
        run: python scripts/seed_demo.py
        env:
          DB_PATH: .e2e-data/seed-check.db
          TZ: Europe/Prague

      - name: Run e2e tests
        run: npx playwright test
        env:
          TZ: Europe/Prague

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
