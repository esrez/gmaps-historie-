name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y fonts-dejavu-core
          pip install -r requirements.txt pytest httpx ruff

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Syntax-check frontend (ES modules)
        run: |
          for f in app/static/common.js app/static/app.js app/static/kniha.js; do
            node --input-type=module --check < "$f" && echo "$f ok"
          done

      - name: Run tests
        run: pytest -q
        env:
          TZ: Europe/Prague
