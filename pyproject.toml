[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "C4"]
ignore = [
    "E501",   # dlouhé řádky hlídáme jen orientačně (SQL/texty)
    "B008",   # fastapi Query(...) v default argumentech je idiom
    "SIM108", # ternár není vždy čitelnější
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]  # sys.path setup před importy aplikace
